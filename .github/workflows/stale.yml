name: Stale

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            此 Issue 已有 60 天没有新活动，如果没有新动态将在 14 天后自动关闭。

            如果问题仍然存在或仍有价值，请留下评论或更新内容以保持开放。感谢你对 PetClaw 的贡献！

            ---

            This issue has been inactive for 60 days. It will be automatically closed in 14 days unless there is new activity.

            If this issue is still relevant, please leave a comment or update it to keep it open. Thank you for contributing to PetClaw!
          close-issue-message: |
            此 Issue 因长期无活动已被自动关闭。如果问题仍然存在，欢迎重新开启。

            ---

            This issue was automatically closed due to inactivity. Feel free to reopen it if the problem persists.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: |
            此 Pull Request 已有 30 天没有新活动，如果没有新动态将在 14 天后自动关闭。

            如果你仍在开发中，请留下评论或推送新的提交以保持开放。感谢你对 PetClaw 的贡献！

            ---

            This pull request has been inactive for 30 days. It will be automatically closed in 14 days unless there is new activity.

            If you're still working on this, please leave a comment or push new commits to keep it open. Thank you for contributing to PetClaw!
          close-pr-message: |
            此 Pull Request 因长期无活动已被自动关闭。如果你想继续，欢迎重新开启。

            ---

            This pull request was automatically closed due to inactivity. Feel free to reopen it if you'd like to continue.

          # Exempt labels
          exempt-issue-labels: "pinned,security,bug,enhancement"
          exempt-pr-labels: "pinned,security,work-in-progress,wip"

          # Only label, don't close draft PRs
          exempt-draft-pr: true

          operations-per-run: 100
