# 全平台构建和发布工作流
#
# 触发时机：
#   - push v* tag  → 自动构建全平台并创建 GitHub Release（draft）
#   - workflow_dispatch → 手动触发，可选择构建哪些平台
#
# 构建矩阵：
#   - macOS arm64  — macos-latest（Apple Silicon）
#   - macOS x64    — macos-13（Intel）
#   - Windows x64  — windows-latest
#   - Linux x64    — ubuntu-latest
#
# OpenClaw runtime 由 dist:* 命令内部的 openclaw:ensure 自动 clone 源码并构建。
#
# 打包产物：
#   - macOS: .dmg + .zip → release/ 目录
#   - Windows: .exe (NSIS installer) → release/ 目录
#   - Linux: .AppImage + .deb → release/ 目录
#
# Release 策略：
#   - tag push 时自动创建 draft Release，需要人工审核后发布
#   - beta/alpha/rc tag 自动标记为 prerelease
#   - 产物保留 30 天

name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_macos_arm64:
        description: 'Build macOS (arm64)'
        required: true
        default: true
        type: boolean
      build_macos_x64:
        description: 'Build macOS (x64)'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows (x64)'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux (x64)'
        required: true
        default: true
        type: boolean

jobs:
  # ========== macOS arm64 构建 ==========
  build-macos-arm64:
    if: ${{ github.event_name == 'push' || inputs.build_macos_arm64 }}
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build macOS arm64
        run: pnpm --filter petclaw-desktop dist:mac:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            petclaw-desktop/release/*.dmg
            petclaw-desktop/release/*.zip
          retention-days: 30

  # ========== macOS x64 构建 ==========
  build-macos-x64:
    if: ${{ github.event_name == 'push' || inputs.build_macos_x64 }}
    name: Build (macOS x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build macOS x64
        run: pnpm --filter petclaw-desktop dist:mac:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            petclaw-desktop/release/*.dmg
            petclaw-desktop/release/*.zip
          retention-days: 30

  # ========== Windows x64 构建 ==========
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build Windows x64
        run: pnpm --filter petclaw-desktop dist:win:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            petclaw-desktop/release/*.exe
          retention-days: 30

  # ========== Linux x64 构建 ==========
  build-linux:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      # Electron 在 Linux 上需要 GTK3、NSS 等系统库
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3-dev libxss1 libgconf-2-4 libatk-bridge2.0-0 libdrm2 libgbm1

      - run: pnpm install --frozen-lockfile

      - name: Build Linux x64
        run: pnpm --filter petclaw-desktop dist:linux:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            petclaw-desktop/release/*.AppImage
            petclaw-desktop/release/*.deb
          retention-days: 30

  # ========== 创建 Release ==========
  # 仅 v* tag push 时运行，下载所有平台产物后创建 draft Release
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos-arm64, build-macos-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          files: artifacts/**/*
          generate_release_notes: true
