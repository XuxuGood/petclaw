name: Electron Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'petclaw-desktop/src/**'
      - 'petclaw-desktop/electron-builder.json'
      - 'petclaw-desktop/package.json'
      - 'petclaw-desktop/electron.vite.config.ts'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install Electron Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libxss1 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libgbm1

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter petclaw-desktop build

      - name: Verify Build Structure
        run: |
          echo "=== Verifying petclaw-desktop/out/renderer/ structure ==="
          for f in petclaw-desktop/out/renderer/index.html; do
            if [ ! -f "$f" ]; then
              echo "❌ $f not found"
              exit 1
            fi
          done
          echo "✓ renderer/ structure verified"

          echo "=== Verifying petclaw-desktop/out/main/ structure ==="
          for f in petclaw-desktop/out/main/index.js petclaw-desktop/out/preload/index.js; do
            if [ ! -f "$f" ]; then
              echo "❌ $f not found"
              exit 1
            fi
          done
          echo "✓ main/preload structure verified"

          echo "=== Build verification complete ==="
