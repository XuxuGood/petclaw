# Labeler Configuration
# Automatically labels PRs based on file changes

"platform: macos":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/build/icons/mac/**"
          - "petclaw-desktop/build/entitlements.mac.plist"
          - "petclaw-desktop/scripts/*mac*"
          - "petclaw-desktop/scripts/notarize.js"

"platform: windows":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/build/icons/win/**"
          - "petclaw-desktop/scripts/*win*"
          - "petclaw-desktop/scripts/nsis-installer.nsh"

"platform: linux":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/build/icons/png/**"
          - "petclaw-desktop/scripts/*linux*"

"area: renderer":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/src/renderer/**"
          - "petclaw-desktop/electron.vite.config.ts"
          - "petclaw-desktop/tailwind.config.*"
          - "petclaw-desktop/postcss.config.*"

"area: main":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/src/main/**"
          - "petclaw-desktop/src/preload/**"
          - "petclaw-desktop/tsconfig.node.json"
          - "petclaw-desktop/tsconfig.json"

"area: openclaw/ai":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/src/main/ai/**"
          - "petclaw-desktop/src/main/mcp/**"
          - "petclaw-desktop/openclaw-extensions/**"
          - "petclaw-desktop/scripts/*openclaw*"

"area: skills":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/SKILLs/**"
          - "petclaw-desktop/src/main/skills/**"

"area: pet":
  - changed-files:
      - any-glob-to-any-file:
          - "petclaw-desktop/src/main/pet/**"
          - "petclaw-desktop/src/renderer/src/pet/**"
          - "petclaw-desktop/src/renderer/src/panels/**"

"area: build":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "petclaw-desktop/electron-builder.json"
          - "petclaw-desktop/scripts/build*.js"
          - "petclaw-desktop/scripts/*build*"
          - "petclaw-desktop/package.json"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - ".ai/**"
          - "**/*.md"
          - "README*"
